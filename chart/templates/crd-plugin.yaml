apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: plugins.eos.io
spec:
  group: eos.io
  names:
    kind: Plugin
    listKind: PluginList
    plural: plugins
    singular: plugin
    shortNames:
      - pl
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: EntityType
          type: string
          jsonPath: .spec.entityTypeUri
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  description: OCI image reference for the plugin (must contain a WASM runner)
                brokerRef:
                  type: string
                  description: Name of the Broker CR this plugin connects to
                entityTypeUri:
                  type: string
                  description: NGSI-LD entity type URI this plugin owns (e.g. https://example.org/Switch)
                tenant:
                  type: string
                  description: Phaeton tenant for this plugin (defaults to agent default tenant)
                replicas:
                  type: integer
                  minimum: 0
                  maximum: 1
                  default: 1
                  description: Number of plugin pod replicas (0 = stopped, 1 = running)
                configMapRef:
                  type: string
                  description: Name of a ConfigMap to mount as env vars into the plugin pod
                secretRef:
                  type: string
                  description: Name of a Secret to mount as env vars into the plugin pod
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Error, Stopped]
                podName:
                  type: string
                subscriptionId:
                  type: string
                registeredAt:
                  type: string
                  format: date-time
                connectedAt:
                  type: string
                  format: date-time
                errorMessage:
                  type: string
                observedGeneration:
                  type: integer
