apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eos.fullname" . }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "eos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eos.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "eos.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: eos
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 4000
          env:
            - name: PHX_SERVER
              value: "true"
            - name: PHX_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PHAETON_URL
              value: {{ .Values.phaeton.url | quote }}
            - name: PHAETON_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.phaeton.agentTokenSecret }}
                  key: {{ .Values.phaeton.agentTokenKey }}
            - name: AGENT_BASE_URL
              value: {{ .Values.agent.baseUrl | quote }}
            - name: AGENT_WS_URL
              value: {{ .Values.agent.wsUrl | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: SECRET_KEY_BASE
            - name: PLUGIN_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: PLUGIN_TOKEN_SECRET
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
