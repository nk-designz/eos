apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eos.fullname" . }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "eos.fullname" . }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
rules:
  # Plugin CRD management
  - apiGroups: ["eos.io"]
    resources: ["plugins", "plugins/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod management for plugin pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Read ConfigMaps and Secrets referenced by plugins
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "eos.fullname" . }}
  labels:
    {{- include "eos.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "eos.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "eos.fullname" . }}
    namespace: {{ .Release.Namespace }}
