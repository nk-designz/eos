# Example Plugin CR — deploy the weather plugin via the EOS operator
#
# Prerequisites:
#   1. A Broker CR named "default-broker" already exists in the same namespace
#   2. The plugin image is available (build with: docker build -t weather-plugin:latest .)
#
# Apply with:
#   kubectl apply -f plugin.yaml -n fiware
---
apiVersion: eos.io/v1alpha1
kind: Plugin
metadata:
  name: weather-plugin
  namespace: fiware
spec:
  image: weather-plugin:latest
  brokerRef:
    name: default-broker
